---
# custom image details
name: ublue-kinoite
description: Custom Universal Blue Kinoite image by BlastPKMN

# base image
base-image: ghcr.io/ublue-os/kinoite-main
image-version: 44

# module configuration, executed in order
modules:
  
  - type: script
    
    # run scripts
    scripts:
    
      - kernel-cachyos.sh

  - type: dnf  
   
    # install packages    
    install:

      packages:
      
        - fastfetch
        - fish
        
    # remove packages
    remove:
      
      packages:
        
        - ark
        - fcitx5
        - filelight
        - firefox
        - firefox-langpacks
        - firewall-config
        - htop
        - kate
        - kde-connect
        - kde-partitionmanager
        - kcharselect
        - kdebugsettings
        - kfind
        - khelpcenter
        - kinfocenter
        - kjournald
        - krfb
        - kwalletmanager5
        - nvtop
        - plasma-discover
        - plasma-drkonqi
        - plasma-welcome
        
  # this sets up the proper policy and signing files for signed images to work fully
  - type: signing
